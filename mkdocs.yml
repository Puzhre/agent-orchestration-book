site_name: Orchestrating Agents — From Hard Guards to Soft Constraints
site_description: A systematic guide to AI Agent orchestration — hard orchestration meets soft orchestration
site_author: Agent Orchestration Study Lab
site_url: https://puzhre.github.io/agent-orchestration-book

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

repo_name: agent-orchestration-book
repo_url: https://github.com/Puzhre/agent-orchestration-book
edit_uri: edit/main/docs/

plugins:
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Part I Hard Orchestration: Part I 硬编排
            Part II Soft Orchestration: Part II 软编排
            Part III Practice & Evolution: Part III 实战与演化
            Appendix: 附录
            Introduction: 导论
            Architecture Patterns: 架构模式
            Role Systems: 角色体系
            Communication: 通信机制
            Fault Tolerance: 容错与恢复
            Isolation & Concurrency: 隔离与并发
            Knowledge Accumulation: 知识积累
            Deployment & Daemons: 部署与守护
            Prompt Engineering: Prompt工程
            Skill Systems: Skill系统
            Pipeline Orchestration: 流水线编排
            Antipatterns: 反模式
            Hands-On: 实战
            Evolution Roadmap: 演化路线
            Glossary: 术语表
            Project Index: 项目索引
            Pattern Cheatsheet: 模式速查
            References: 参考资源
  - search

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - meta
  - toc:
      permalink: true
  - attr_list
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist
  - pymdownx.tilde

nav:
  - Home: index.md
  - Part I Hard Orchestration:
    - 1. Introduction: chapters/01-introduction.md
    - 2. Architecture Patterns: chapters/02-architecture.md
    - 3. Role Systems: chapters/03-roles.md
    - 4. Communication: chapters/04-communication.md
    - 5. Fault Tolerance: chapters/05-fault-tolerance.md
    - 6. Isolation & Concurrency: chapters/06-isolation.md
    - 7. Knowledge Accumulation: chapters/07-knowledge.md
    - 8. Deployment & Daemons: chapters/08-deployment.md
  - Part II Soft Orchestration:
    - 9. Prompt Engineering: chapters/09-prompt-engineering.md
    - 10. Skill Systems: chapters/10-skill-system.md
    - 11. Pipeline Orchestration: chapters/11-pipeline-orchestration.md
    - 12. Antipatterns: chapters/12-antipatterns.md
  - Part III Practice & Evolution:
    - 13. Hands-On: chapters/13-hands-on.md
    - 14. Evolution Roadmap: chapters/14-evolution.md
  - Appendix:
    - Glossary: appendix/glossary.md
    - Project Index: appendix/project-index.md
    - Pattern Cheatsheet: appendix/pattern-cheatsheet.md
    - References: appendix/resources.md
